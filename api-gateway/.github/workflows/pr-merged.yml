name: PR Merged — App CI + Push

on:
  push:
    branches: [main]
    paths-ignore:
      - 'iac/**'
      - '*.md'

jobs:
  app-ci:
    uses: proops2026-helpdesk/cicd-platform/.github/workflows/reusable-app-ci.yml@v1
    with:
      runtime-version: "20"
      project-name: "proops2026"
      service-name: "api-gateway"
      image-tag: ${{ github.sha }}
      push-image: true
    secrets:
      REGISTRY_USERNAME: ${{ secrets.REGISTRY_USERNAME }}
      REGISTRY_TOKEN: ${{ secrets.REGISTRY_TOKEN }}
