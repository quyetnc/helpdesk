apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: helpdesk-staging
  namespace: argocd
spec:
  project: default

  source:
    repoURL: https://github.com/quyet/helpdesk
    targetRevision: HEAD
    path: k8s-new/helm
    helm:
      releaseName: helpdesk-staging
      values: |
        # Override values for staging environment
        environment: staging
      valueFiles:
        - environments/staging/values.yaml

  destination:
    server: https://kubernetes.default.svc
    namespace: staging

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
