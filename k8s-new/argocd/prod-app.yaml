apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: helpdesk-prod
  namespace: argocd
spec:
  project: default

  source:
    repoURL: https://github.com/quyet/helpdesk
    targetRevision: main  # Prod uses main branch only
    path: k8s-new/helm
    helm:
      releaseName: helpdesk-prod
      values: |
        # Override values for production environment
        environment: prod
      valueFiles:
        - environments/prod/values.yaml

  destination:
    server: https://kubernetes.default.svc
    namespace: prod

  syncPolicy:
    syncOptions:
      - CreateNamespace=true
    # NO automated sync for production - manual approvals only
    retry:
      limit: 3
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
