# Dev Environment Overrides
# All values in this file override base values.yaml
# minReplicas set to 1 to conserve node pod capacity (max ~17 pods per node)

environment: dev
namespace: default

# Use correct image tags for dev (commit SHAs)
services:
  api-gateway:
    image:
      tag: "d9d41d7"
    replicaCount: 1
    autoscaling:
      enabled: true
      minReplicas: 1
      maxReplicas: 3
      targetCPUUtilizationPercentage: 75

  user-service:
    image:
      tag: "d9d41d7"
    replicaCount: 1
    autoscaling:
      enabled: true
      minReplicas: 1
      maxReplicas: 3
      targetCPUUtilizationPercentage: 75

  ticket-service:
    image:
      tag: "d9d41d7"
    replicaCount: 1
    autoscaling:
      enabled: true
      minReplicas: 1
      maxReplicas: 3
      targetCPUUtilizationPercentage: 75

  notification-service:
    image:
      tag: "d9d41d7"
    replicaCount: 1
    autoscaling:
      enabled: false

  frontend:
    image:
      tag: "d9d41d7"
    replicaCount: 1
    autoscaling:
      enabled: true
      minReplicas: 1
      maxReplicas: 2
      targetCPUUtilizationPercentage: 75

# Dev secrets
secrets:
  jwt-secret:
    JWT_SECRET: "QuYetDev@JWT#Secret2026!ghi789stu"

  db-credentials:
    DATABASE_URL_USERS: "postgres://postgres:QuYet@DevDB#Users2026!abc123xyz@postgres-users-postgresql:5432/users_db"
    DATABASE_URL_TICKETS: "postgres://postgres:QuYet@DevDB#Tickets2026!def456uvw@postgres-tickets-postgresql:5432/tickets_db"

  rabbitmq-secret:
    RABBITMQ_USERNAME: "user"
    RABBITMQ_PASSWORD: "rabbitmq-dev-123"
    RABBITMQ_URL: "amqp://user:rabbitmq-dev-123@rabbitmq:5672/"

  api-keys-secret:
    SENDGRID_API_KEY: "sg-dev-key-xxx"
    SLACK_WEBHOOK_URL: "https://hooks.slack.com/services/dev/xxx"
    DISCORD_WEBHOOK_URL: "https://discord.com/api/webhooks/dev/xxx"

# Dev ingress (no hostname, local access)
ingress:
  enabled: true
  className: nginx
  hostname: ""
  paths:
    - path: /
      pathType: Prefix
      service: frontend
      port: 3100
    - path: /api
      pathType: Prefix
      service: api-gateway
      port: 3000
