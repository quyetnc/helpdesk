{{- range $serviceName, $service := $.Values.services }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ $service.serviceName }}
  namespace: {{ $.Values.namespace }}
  labels:
    app: {{ $service.appLabel }}
    tier: {{ $service.tier }}
    managed-by: helm
spec:
  {{- if not $service.autoscaling.enabled }}
  replicas: {{ $service.replicaCount }}
  {{- end }}
  selector:
    matchLabels:
      app: {{ $service.appLabel }}
  template:
    metadata:
      labels:
        app: {{ $service.appLabel }}
        tier: {{ $service.tier }}
    spec:
      containers:
      - name: {{ $service.serviceName }}
        {{- if $service.image.registry }}
        image: "{{ $service.image.registry }}/{{ $service.image.repository }}:{{ $service.image.tag }}"
        {{- else if eq $service.image.repository "rabbitmq" }}
        image: "{{ $service.image.repository }}:{{ $service.image.tag }}"
        {{- else }}
        image: "{{ $.Values.global.imageRegistry }}/{{ $service.image.repository }}:{{ $service.image.tag }}"
        {{- end }}
        imagePullPolicy: {{ $.Values.global.imagePullPolicy }}
        ports:
        - name: http
          containerPort: {{ $service.service.targetPort }}
          protocol: TCP

        {{- if or $service.configMapRef $service.secretRefs }}
        envFrom:
        {{- if $service.configMapRef }}
        - configMapRef:
            name: {{ $service.configMapRef }}
        {{- end }}
        {{- if $service.secretRefs }}
        {{- range $service.secretRefs }}
        - secretRef:
            name: {{ . }}
        {{- end }}
        {{- end }}
        {{- end }}

        {{- if $service.env }}
        env:
          {{- toYaml $service.env | nindent 12 }}
        {{- end }}

        readinessProbe:
          httpGet:
            path: {{ $service.healthcheck.path }}
            port: http
          initialDelaySeconds: {{ $service.healthcheck.initialDelaySeconds }}
          periodSeconds: {{ $service.healthcheck.periodSeconds }}
          timeoutSeconds: {{ $service.healthcheck.timeoutSeconds }}
          failureThreshold: {{ $service.healthcheck.failureThreshold }}

        livenessProbe:
          httpGet:
            path: {{ $service.healthcheck.path }}
            port: http
          initialDelaySeconds: {{ $service.healthcheck.livenessDelaySeconds }}
          periodSeconds: {{ $service.healthcheck.periodSeconds }}
          timeoutSeconds: {{ $service.healthcheck.timeoutSeconds }}
          failureThreshold: {{ $service.healthcheck.failureThreshold }}

        resources:
          {{- toYaml $service.resources | nindent 12 }}

        lifecycle:
          preStop:
            exec:
              command: ["/bin/sh", "-c", "sleep 15"]

{{- end }}
