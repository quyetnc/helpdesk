name: Deploy Staging (manual)

on:
  workflow_dispatch:
    inputs:
      image-tag:
        description: "Commit SHA to deploy (copy from build run summary)"
        type: string
        required: true

jobs:
  deploy:
    uses: quyetnc/cicd-platform/.github/workflows/reusable-deploy.yml@v2
    with:
      image-tag: ${{ inputs.image-tag }}
      environment: staging
      project-name: "proops2026-helpdesk"
      service-name: "frontend"
    secrets:
      KUBE_CONFIG_DATA: ${{ secrets.KUBE_CONFIG_DATA }}
      REGISTRY_TOKEN: ${{ secrets.REGISTRY_TOKEN }}
