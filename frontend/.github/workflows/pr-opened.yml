name: PR Open — App CI

on:
  pull_request:
    paths-ignore:
      - 'iac/**'
      - '*.md'
    branches: [main]
    types: [opened, synchronize]

permissions:
  contents: read

jobs:
  app-ci:
    uses: quyetnc/cicd-platform/.github/workflows/reusable-app-ci.yml@v1
    with:
      runtime-version: "20"
      project-name: "proops2026-helpdesk"
      service-name: "frontend"
      image-tag: ${{ github.sha }}
      push-image: false
