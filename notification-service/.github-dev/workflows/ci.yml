name: CI - Build, Test, Push to ECR, Update k8s Repo

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  SERVICE_NAME: notification-service
  AWS_REGION: us-east-1
  ECR_REGISTRY: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.us-east-1.amazonaws.com

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npm test

  build-and-push:
    needs: test
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        run: |
          aws ecr get-login-password --region ${{ env.AWS_REGION }} | \
            docker login --username AWS --password-stdin ${{ env.ECR_REGISTRY }}

      - name: Build Docker image
        run: |
          docker build -t ${{ env.ECR_REGISTRY }}/${{ env.SERVICE_NAME }}:${{ github.sha }} .
          docker tag ${{ env.ECR_REGISTRY }}/${{ env.SERVICE_NAME }}:${{ github.sha }} \
                     ${{ env.ECR_REGISTRY }}/${{ env.SERVICE_NAME }}:latest

      - name: Push to ECR
        run: |
          docker push ${{ env.ECR_REGISTRY }}/${{ env.SERVICE_NAME }}:${{ github.sha }}
          docker push ${{ env.ECR_REGISTRY }}/${{ env.SERVICE_NAME }}:latest

      - name: Update k8s repo with new image tag
        run: |
          git clone https://github.com/quyetnc/proops2026.git k8s-repo
          cd k8s-repo
          git config user.email "ci@proops2026.local"
          git config user.name "CI/CD Bot"
          sed -i "s/tag: .*/tag: ${{ github.sha }}/g" k8s/helm/values/${{ env.SERVICE_NAME }}.yaml
          git add k8s/helm/values/${{ env.SERVICE_NAME }}.yaml
          git commit -m "bump ${{ env.SERVICE_NAME }} to ${{ github.sha }}"
          git push https://${{ secrets.GH_TOKEN }}@github.com/quyetnc/proops2026.git main

      - name: Summary
        run: |
          echo "✅ Build complete!"
          echo "Image: ${{ env.ECR_REGISTRY }}/${{ env.SERVICE_NAME }}:${{ github.sha }}"
