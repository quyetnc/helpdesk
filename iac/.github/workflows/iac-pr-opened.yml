name: IaC PR Open — Plan

on:
  pull_request:
    paths: ['iac/**']
    branches: [main]
    types: [opened, synchronize]

jobs:
  iac-plan:
    uses: proops2026-helpdesk/cicd-platform/.github/workflows/reusable-iac.yml@v1
    with:
      action: plan
      environment: lab
      working-directory: iac/lab
    secrets:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
