name: "Docker Build and Push"
description: "Build a Docker image and optionally push to a registry"

inputs:
  registry:
    description: "Container registry (e.g., ghcr.io, docker.io)"
    required: false
    default: "ghcr.io"
  image-name:
    description: "Full image name without tag"
    required: true
  image-tag:
    description: "Image tag (recommended: commit SHA)"
    required: true
  push:
    description: "Push to registry (true) or build only (false)"
    required: false
    default: "false"
  registry-username:
    description: "Registry username"
    required: false
  registry-password:
    description: "Registry password or token"
    required: false

runs:
  using: "composite"
  steps:
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Login to registry
      if: inputs.push == 'true'
      uses: docker/login-action@v3
      with:
        registry: ${{ inputs.registry }}
        username: ${{ inputs.registry-username }}
        password: ${{ inputs.registry-password }}

    - name: Build and push
      uses: docker/build-push-action@v5
      with:
        context: .
        push: ${{ inputs.push }}
        tags: ${{ inputs.registry }}/${{ inputs.image-name }}:${{ inputs.image-tag }}
        cache-from: type=gha
        cache-to: type=gha,mode=max
